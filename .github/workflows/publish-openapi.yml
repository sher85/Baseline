name: Publish OpenAPI Catalog Entry

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-openapi:
    runs-on: ubuntu-latest

    steps:
      - name: Require main for manual runs
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "Manual catalog publishing is only allowed from main."
          exit 1

      - name: Check out service repo
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate OpenAPI spec
        run: npm run openapi:generate

      - name: Validate OpenAPI spec
        run: npm run openapi:validate

      - name: Publish OpenAPI spec into catalog
        env:
          API_CATALOG_TOKEN: ${{ secrets.API_CATALOG_TOKEN }}
        run: |
          test -n "$API_CATALOG_TOKEN"
          catalog_dir="$(mktemp -d)"
          trap 'rm -rf "$catalog_dir"' EXIT

          git clone "https://x-access-token:${API_CATALOG_TOKEN}@github.com/sher85/openclaw-api-catalog.git" "${catalog_dir}"

          mkdir -p "${catalog_dir}/services/baseline"
          cp openapi/openapi.json "${catalog_dir}/services/baseline/openapi.json"

          if [ -z "$(git -C "${catalog_dir}" status --short --untracked-files=all -- "services/baseline/openapi.json")" ]; then
            echo "Catalog spec is already up to date."
            exit 0
          fi

          git -C "${catalog_dir}" config user.name "github-actions[bot]"
          git -C "${catalog_dir}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${catalog_dir}" add "services/baseline/openapi.json"
          git -C "${catalog_dir}" commit -m "chore: update baseline OpenAPI spec"
          git -C "${catalog_dir}" push
