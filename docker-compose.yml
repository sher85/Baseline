services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      default:
        aliases:
          - baseline-db
    environment:
      POSTGRES_DB: wearable_analytics
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wearable_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    networks:
      default:
        aliases:
          - baseline-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/wearable_analytics
    command: ["npm", "run", "db:migrate:deploy"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    networks:
      default:
        aliases:
          - baseline-api
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/wearable_analytics
      API_PORT: 3001
      WEB_APP_URL: http://baseline.localhost:8000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
      OURA_REDIRECT_URI: http://baseline.localhost:8000/api/integrations/oura/callback
      OURA_CLIENT_ID: ${OURA_CLIENT_ID:-}
      OURA_CLIENT_SECRET: ${OURA_CLIENT_SECRET:-}
      OURA_SCOPES: ${OURA_SCOPES:-daily email personal}
      SYNC_SCHEDULE_ENABLED: ${SYNC_SCHEDULE_ENABLED:-true}
      SYNC_SCHEDULE_CRON: ${SYNC_SCHEDULE_CRON:-0 6 * * *}
      SYNC_SCHEDULE_RUN_ON_START: ${SYNC_SCHEDULE_RUN_ON_START:-false}
    ports:
      - "3001:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    networks:
      default:
        aliases:
          - baseline-web
    depends_on:
      api:
        condition: service_healthy
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      API_INTERNAL_BASE_URL: http://api:3001
      API_PROXY_TARGET: http://api:3001
      NEXT_PUBLIC_API_BASE_URL: http://baseline.localhost:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres-data:

networks:
  default:
    name: baseline
