  <text x="992" y="532" fill="#1F1C18" font-size="30" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Sleep timing regularity</text>

  <rect x="992" y="560" width="140" height="86" rx="22" fill="#F7EFE2"/>
