  <text x="280" y="208" fill="#0F766E" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="2.6">SLEEP SURFACE</text>
  <text x="280" y="286" fill="#201D18" font-size="60" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Nightly sleep,</text>
  <text x="280" y="346" fill="#201D18" font-size="60" font-family="Georgia, 'Times New Roman', serif" font-weight="700">with context instead of guesswork.</text>
  <text x="282" y="390" fill="#6E655B" font-size="22" font-family="Arial, Helvetica, sans-serif">Sleep totals, efficiency, timing, and bedtime regularity</text>
  <text x="282" y="420" fill="#6E655B" font-size="22" font-family="Arial, Helvetica, sans-serif">are measured against your recent pattern.</text>

