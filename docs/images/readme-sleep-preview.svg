      <stop stop-color="#FBF5EC"/>
      <stop offset="1" stop-color="#EEE3D3"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1260 180) rotate(90) scale(260 260)">
      <stop stop-color="#8FD4CC" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#8FD4CC" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="180" y="100" width="1240" height="760" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#7E6140" flood-opacity="0.13"/>
