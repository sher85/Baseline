<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sleepBg" x1="180" y1="80" x2="1420" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF5EC"/>
      <stop offset="1" stop-color="#EEE4D3"/>
    </linearGradient>
    <radialGradient id="sleepOrb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1320 160) rotate(90) scale(260 260)">
      <stop stop-color="#8FD4CC" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#8FD4CC" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sleepPanel" x1="240" y1="120" x2="1360" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#FCF6ED"/>
    </linearGradient>
    <filter id="sleepShadow" x="190" y="90" width="1220" height="740" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#7E6140" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="1600" height="920" rx="40" fill="url(#sleepBg)"/>
  <rect width="1600" height="920" rx="40" fill="url(#sleepOrb)"/>

  <g filter="url(#sleepShadow)">
