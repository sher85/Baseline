  <text x="270" y="196" fill="#0F766E" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="2.6">SLEEP SURFACE</text>
  <text x="270" y="268" fill="#201D18" font-size="58" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Nightly sleep,</text>
  <text x="270" y="324" fill="#201D18" font-size="58" font-family="Georgia, 'Times New Roman', serif" font-weight="700">with context instead of guesswork.</text>
  <text x="272" y="366" fill="#6E655B" font-size="21" font-family="Arial, Helvetica, sans-serif">Totals, efficiency, timing, and regularity</text>
  <text x="272" y="396" fill="#6E655B" font-size="21" font-family="Arial, Helvetica, sans-serif">are read against your own recent pattern.</text>

  <rect x="270" y="450" width="650" height="300" rx="28" fill="#FFF9F1" stroke="#E8DDCC"/>
  <text x="310" y="495" fill="#0F766E" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="2.6">7-DAY TREND</text>
  <text x="310" y="532" fill="#1F1C18" font-size="34" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Sleep duration</text>

