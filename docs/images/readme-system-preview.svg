<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sysBg" x1="200" y1="80" x2="1400" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCF6EC"/>
      <stop offset="1" stop-color="#EEE3D3"/>
    </linearGradient>
    <radialGradient id="sysGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1180 160) rotate(90) scale(260 260)">
      <stop stop-color="#1F9A8C" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#1F9A8C" stop-opacity="0"/>
    </radialGradient>
    <filter id="sysShadow" x="168" y="82" width="1264" height="756" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#7E6140" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="920" rx="40" fill="url(#sysBg)"/>
  <rect width="1600" height="920" rx="40" fill="url(#sysGlow)"/>

  <g filter="url(#sysShadow)">
    <rect x="188" y="102" width="1224" height="716" rx="34" fill="#FFFBF5" stroke="#E7DDCD"/>
  </g>

  <text x="254" y="184" fill="#0F766E" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="2.8">SYSTEM PREVIEW</text>
  <text x="254" y="260" fill="#1F1C18" font-size="60" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Deterministic backend truth,</text>
  <text x="254" y="318" fill="#1F1C18" font-size="60" font-family="Georgia, 'Times New Roman', serif" font-weight="700">human-facing and AI-facing.</text>
  <text x="256" y="362" fill="#6F655B" font-size="22" font-family="Arial, Helvetica, sans-serif">Vendor data stays isolated.</text>
  <text x="256" y="392" fill="#6F655B" font-size="22" font-family="Arial, Helvetica, sans-serif">Normalized records become app-owned truth.</text>
  <text x="256" y="422" fill="#6F655B" font-size="22" font-family="Arial, Helvetica, sans-serif">Those analytics flow into both the dashboard and AI endpoints.</text>

  <rect x="248" y="472" width="206" height="208" rx="28" fill="#FFF8EE" stroke="#E7DCCC"/>
  <text x="278" y="522" fill="#0F766E" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="2.4">INGESTION</text>
  <text x="278" y="566" fill="#1F1C18" font-size="30" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Oura API</text>
  <text x="278" y="606" fill="#6F655B" font-size="16" font-family="Arial, Helvetica, sans-serif">OAuth and refresh handling</text>
  <text x="278" y="632" fill="#6F655B" font-size="16" font-family="Arial, Helvetica, sans-serif">Manual, scheduled,</text>
  <text x="278" y="658" fill="#6F655B" font-size="16" font-family="Arial, Helvetica, sans-serif">and backfill sync</text>

  <rect x="486" y="472" width="248" height="208" rx="28" fill="#FFF8EE" stroke="#E7DCCC"/>
  <text x="516" y="522" fill="#0F766E" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="2.4">NORMALIZATION</text>
  <text x="516" y="566" fill="#1F1C18" font-size="28" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Postgres plus Prisma</text>
  <text x="516" y="606" fill="#6F655B" font-size="16" font-family="Arial, Helvetica, sans-serif">DailySleep</text>
  <text x="516" y="632" fill="#6F655B" font-size="16" font-family="Arial, Helvetica, sans-serif">DailyRecoveryInput</text>
  <text x="516" y="658" fill="#6F655B" font-size="16" font-family="Arial, Helvetica, sans-serif">DailyActivity and SyncRun</text>

  <rect x="766" y="472" width="248" height="208" rx="28" fill="#FFF8EE" stroke="#E7DCCC"/>
  <text x="796" y="522" fill="#0F766E" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="2.4">ANALYTICS</text>
  <text x="796" y="566" fill="#1F1C18" font-size="28" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Recovery engine</text>
  <text x="796" y="606" fill="#6F655B" font-size="16" font-family="Arial, Helvetica, sans-serif">Rolling baselines</text>
  <text x="796" y="632" fill="#6F655B" font-size="16" font-family="Arial, Helvetica, sans-serif">Score v1 and explanations</text>
  <text x="796" y="658" fill="#6F655B" font-size="16" font-family="Arial, Helvetica, sans-serif">Deterministic anomalies</text>

  <rect x="1046" y="472" width="324" height="208" rx="28" fill="#FFF8EE" stroke="#E7DCCC"/>
  <text x="1076" y="522" fill="#0F766E" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="2.4">DELIVERY</text>
  <text x="1076" y="566" fill="#1F1C18" font-size="28" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Dashboard plus AI</text>
  <text x="1076" y="606" fill="#6F655B" font-size="16" font-family="Arial, Helvetica, sans-serif">Overview, Sleep, Recovery, Trends</text>
  <text x="1076" y="632" fill="#6F655B" font-size="16" font-family="Arial, Helvetica, sans-serif">Daily brief, last-night, recovery</text>
  <text x="1076" y="658" fill="#6F655B" font-size="16" font-family="Arial, Helvetica, sans-serif">and anomaly context payloads</text>

  <path d="M454 575H486" stroke="#B9A88E" stroke-width="4" stroke-linecap="round"/>
  <path d="M734 575H766" stroke="#B9A88E" stroke-width="4" stroke-linecap="round"/>
  <path d="M1014 575H1046" stroke="#B9A88E" stroke-width="4" stroke-linecap="round"/>
  <path d="M474 575L458 565V585L474 575Z" fill="#B9A88E"/>
  <path d="M754 575L738 565V585L754 575Z" fill="#B9A88E"/>
  <path d="M1034 575L1018 565V585L1034 575Z" fill="#B9A88E"/>

  <rect x="248" y="714" width="1122" height="84" rx="20" fill="#F8F0E3" stroke="#E7DCCC"/>
  <text x="292" y="748" fill="#6A6157" font-size="18" font-family="Arial, Helvetica, sans-serif">Single-user, local-first, and public-repo-safe.</text>
  <text x="292" y="776" fill="#6A6157" font-size="18" font-family="Arial, Helvetica, sans-serif">Real personal data stays local. Raw payload blobs are not persisted.</text>
</svg>
